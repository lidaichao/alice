# Alice Tool Registry — 白泽风格插件注册表
# 每个工具一个条目，支持 skill.md 文档 + 配置参数
#
# 可用知识源 (S0路由器选择):
# - jira:   Jira项目管理系统 (query_jira_issues, get_issue_commits, get_issue_diff)
# - svn:    SVN代码仓库+FishEye (get_issue_commits, get_issue_diff)
# - notion: Notion知识库 (search_knowledge_base)
# - gdrive: Google云盘知识库 (search_knowledge_base)
#
tools:
  - name: query_jira_issues
    display: "Jira 查询"
    description: "查询 Jira 系统中的任务、缺陷或需求。支持标准 JQL、直接输入 issue key（如 CT-11104）、中文状态名（待办/处理中/已完成）、时间关键词（今天/本周/最近7天）。搜索失败时返回错误详情供自动修正"
    category: jira
    icon: 🎫
    risk: readonly
    skill_file: tools/jira/skill.md
    function:
      parameters:
        jql:
          type: string
          description: "JQL 查询语句或 issue key（如 CT-11104）。支持中文状态名（待办/处理中/已完成/已解决）和时间关键词（今天/昨天/本周/本月/最近N天），系统会自动翻译"
          required: true
        max_results:
          type: integer
          description: "返回的最大结果数量"
          default: 5

  - name: search_knowledge_base
    display: "知识库检索"
    description: "搜索Notion知识库。如果用户问题宽泛（如'有哪些文档'），请将query留空。获取结果后，必须直接以 Markdown 列表格式输出：'- [文档名](链接)'。绝不输出其他多余废话。"
    category: knowledge
    icon: 📚
    risk: readonly
    skill_file: tools/knowledge/skill.md
    function:
      parameters:
        query:
          type: string
          description: "要搜索的核心关键词。宽泛提问时传空字符串触发全局检索"
          required: true
        source:
          type: string
          enum: [notion, svn, gdrive, all]
          description: "指定检索的知识库来源"
          default: all

  - name: get_issue_commits
    display: "代码提交查询"
    description: "获取某个 Jira 任务关联的 SVN 代码提交记录，包括提交者、时间、文件数、增删行数、提交信息和FishEye链接"
    category: jira
    icon: 📝
    risk: readonly
    skill_file: tools/jira/skill.md
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true

  - name: get_issue_diff
    display: "代码差异查询"
    description: "获取某个 Jira 任务关联代码提交的详细 DIFF 变更内容（文件差异对比）"
    category: jira
    icon: 🔍
    risk: readonly
    skill_file: tools/jira/skill.md
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true
        max_files:
          type: integer
          description: "最大返回文件数"
          default: 10

  - name: add_jira_comment
    display: "Jira 评论"
    description: "为指定的 Jira 任务添加评论。此操作需要用户确认后才能执行"
    category: jira
    icon: 💬
    risk: write
    skill_file: tools/jira/skill.md
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true
        body:
          type: string
          description: "要添加的评论内容"
          required: true

  - name: list_jira_comments
    display: "评论列表"
    description: "查看指定 Jira 任务的评论列表。可以用来了解任务讨论进展"
    category: jira
    icon: 📋
    risk: readonly
    skill_file: tools/jira/skill.md
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true
        max_results:
          type: integer
          description: "最大返回评论数"
          default: 10
