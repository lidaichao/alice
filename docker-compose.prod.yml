# Alice v3.0 -RC · 生产部署配置
# Phase 5.5 · 2026-06-10
# 一键启动: docker compose -f docker-compose.prod.yml up -d
# 验证语法: docker compose -f docker-compose.prod.yml config

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════
  # 服务 1: Alice Hub（核心 API 网关）
  # ═══════════════════════════════════════════════════════════
  alice-hub:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alice-hub
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Flask
      FLASK_ENV: production
      AI_BRIDGE_PORT: "5000"
      # Jira
      JIRA_BASE_URL: ${ALICE_JIRA_URL}
      JIRA_PAT: ${ALICE_JIRA_PAT}
      # Dify RAG
      DIFY_BASE_URL: http://dify-api:5001
      DIFY_API_KEY: ${DIFY_API_KEY}
      DIFY_DATASET_API_KEY: ${DIFY_DATASET_API_KEY:-}
      DIFY_DATASET_ID: ${DIFY_DATASET_ID}
      # n8n
      N8N_BASE_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL}/webhook
      # AI
      DEEPSEEK_URL: https://api.deepseek.com/v1/chat/completions
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: deepseek-v4-flash
      # 安全
      ALICE_MOCK_N8N: "false"
      ALICE_ADMIN_PASSWORD: ${ALICE_ADMIN_PASSWORD}
    volumes:
      - alice_data:/app/data
      - alice_logs:/app/logs
      - ./backend/global_config.json:/app/global_config.json:ro
      - ./frontend/dist:/frontend/dist:ro
    depends_on:
      - dify-api
      - n8n
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  # ═══════════════════════════════════════════════════════════
  # 服务 2: Dify API（知识库 RAG）
  # ═══════════════════════════════════════════════════════════
  dify-api:
    image: langgenius/dify-api:1.3.0
    container_name: alice-dify-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY:-dify-alice-v3-prod-secret}
      LOG_LEVEL: INFO
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify-alice-pg-prod}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://dify-weaviate:8080
      CODE_MAX_NUMBER: 9223372036854775807
      CODE_MIN_NUMBER: -9223372036854775808
      CODE_MAX_DEPTH: 5
      CODE_MAX_STRING_LENGTH: 80000
      SANDBOX_ENDPOINT: http://dify-sandbox:8194
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started
      dify-weaviate:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

  # Dify PostgreSQL
  dify-db:
    image: postgres:15-alpine
    container_name: alice-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-dify-alice-pg-prod}
      POSTGRES_DB: dify
    volumes:
      - dify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dify"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dify Redis
  dify-redis:
    image: redis:7-alpine
    container_name: alice-dify-redis
    restart: unless-stopped
    volumes:
      - dify_redis:/data

  # Dify Weaviate
  dify-weaviate:
    image: semitechnologies/weaviate:1.29.0
    container_name: alice-dify-weaviate
    restart: unless-stopped
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - dify_weaviate:/var/lib/weaviate

  # Dify Sandbox
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.10
    container_name: alice-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
    volumes:
      - dify_sandbox:/dependencies

  # ═══════════════════════════════════════════════════════════
  # 服务 3: n8n（工作流自动化）
  # ═══════════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:1.87.0
    container_name: alice-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD:-changeme}
      N8N_HOST: n8n
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL:-http://n8n:5678}
      N8N_ONBOARDING_FLOW_DISABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      N8N_API_KEY: ${N8N_API_KEY:-alice-n8n-api-key-prod-2026}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backend/n8n_workflows:/workflows:ro
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

  # ═══════════════════════════════════════════════════════════
  # 服务 4: Admin UI 静态服务（nginx）
  # ═══════════════════════════════════════════════════════════
  admin-ui:
    image: nginx:alpine
    container_name: alice-admin-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/static/admin:/usr/share/nginx/html/admin:ro
      - ./nginx.admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - alice-hub

volumes:
  alice_data:
  alice_logs:
  dify_storage:
  dify_pgdata:
  dify_redis:
  dify_weaviate:
  dify_sandbox:
  n8n_data:
