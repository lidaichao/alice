# Alice Admin UI nginx 配置
# v3.1-rc1 · 生产部署（测试清零 + Dify 双 Key 支持）

server {
    listen 80;
    server_name localhost;

    # Admin 静态文件（Vite build → backend/static/admin/）
    location /admin-static/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin-static/index.html;
    }

    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Alice Hub（含 /v1 全部端点）
    location /v1/ {
        proxy_pass http://alice-hub:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（Agent 流式）
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 健康检查直通
    location /health {
        proxy_pass http://alice-hub:5000/health;
        proxy_set_header Host $host;
    }
}
