<!-- ═══════════════════════════════════════════════════
  WorkBuddy AI — 共享聊天对话框
  两边复用：admin.html (全宽) + chat.js (670px 侧栏)
  通过 URL 参数 ?width=670 控制面板宽度
  ═══════════════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
  WorkBuddy AI — 顶级 SaaS 质感 (Jira Native 原生级配色)
  ═══════════════════════════════════════════════════ */

/* 1. Atlassian Design Tokens (完美复刻 Jira 原生色彩) */
.wb-dialog-scope {
  --c-chat-bg:#F4F5F7; --c-chat-header:#FFFFFF; --c-chat-header-text:#172B4D;
  --c-issue-bg:#FFFFFF; --c-issue-text:#172B4D; --c-issue-border:#DFE1E6; --c-issue-inp-bg:#F4F5F7;
  --c-user-bubble:#0052CC; --c-user-text:#FFFFFF;
  --c-input-card:#FFFFFF; --c-input-bg:#FFFFFF; --c-input-border:#DFE1E6; --c-input-focus:#4C9AFF;
  --c-send-btn:#0052CC; --c-send-text:#FFFFFF;
  --c-chip-bg:#F4F5F7; --c-chip-text:#42526E; --c-chip-hover:#EBECF0;
  --c-ai-text:#172B4D; --c-ai-label:#5E6C84; --c-divider:#DFE1E6;
  --c-code-bg:#EBECF0; --c-btn-copy-bg:#FFFFFF; --c-btn-copy-border:#DFE1E6; --c-btn-copy-text:#42526E;
  --shadow-header:0 1px 4px rgba(9,30,66,.08);
}
.wb-dialog-scope[data-theme="dark"] {
  --c-chat-bg:#1D2125; --c-chat-header:#22272B; --c-chat-header-text:#9FADBC;
  --c-issue-bg:#22272B; --c-issue-text:#9FADBC; --c-issue-border:#2C333A; --c-issue-inp-bg:#1D2125;
  --c-user-bubble:#1D7AFC; --c-user-text:#FFFFFF;
  --c-input-card:#22272B; --c-input-bg:#1D2125; --c-input-border:#2C333A; --c-input-focus:#579DFF;
  --c-send-btn:#579DFF; --c-send-text:#1D2125;
  --c-chip-bg:#2C333A; --c-chip-text:#9FADBC; --c-chip-hover:#1D2125;
  --c-ai-text:#E2E8F0; --c-ai-label:#94A3B8; --c-divider:#2C333A;
  --c-code-bg:#2C333A; --c-btn-copy-bg:#22272B; --c-btn-copy-border:#2C333A; --c-btn-copy-text:#9FADBC;
  --shadow-header:0 1px 4px rgba(0,0,0,.5);
}


/* 2. 布局与头部 */
.chat-header{background:var(--c-chat-header);color:var(--c-chat-header-text);padding:16px 20px;font-size:16px;font-weight:700;border-bottom:1px solid var(--c-divider);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-header);z-index:10;flex-shrink:0}
.btn-close-panel{background:transparent;border:none;color:var(--c-ai-label);font-size:18px;cursor:pointer;padding:2px 8px;border-radius:6px;margin-right:8px;transition:all .2s}
.btn-close-panel:hover{background:var(--c-issue-bg);color:var(--c-chat-header-text)}
.chat-issue{background:var(--c-issue-bg);padding:10px 20px;font-size:13px;font-weight:600;color:var(--c-issue-text);border-bottom:1px solid var(--c-divider);display:flex;align-items:center;gap:8px}
.chat-body {
  flex: 1; overflow-y: auto; padding: 24px 20px; 
  background: var(--c-chat-bg); 
  scroll-behavior: auto !important;
}
.chat-body .hint-box{text-align:center;color:var(--c-ai-label);font-size:13px;padding:40px 20px}
.issue-key-input{border:1px solid var(--c-issue-border);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;color:var(--c-chat-header-text);background:var(--c-issue-inp-bg);text-align:center;outline:none;transition:all .2s}
.issue-key-input:focus{border-color:var(--c-input-focus)}
.apply-issue-btn{border:1px solid var(--c-issue-border);border-radius:6px;padding:4px 12px;font-size:12px;background:var(--c-chat-header);color:var(--c-issue-text);cursor:pointer;font-weight:600;transition:all .2s}
.apply-issue-btn:hover{background:var(--c-issue-inp-bg)}

/* 3. 消息气泡 */
.msg-b{margin-bottom:28px;display:flex;flex-direction:column;animation:msgFadeIn .3s ease}
@keyframes msgFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-b.user{align-items:flex-end;position:relative}
.msg-b.user .msg-content{background:var(--c-user-bubble);color:var(--c-user-text);padding:12px 18px;border-radius:18px 18px 4px 18px;max-width:85%;font-size:1em;line-height:1.6;word-break:break-word}
.msg-b.user .btn-copy-user{position:absolute;bottom:4px;left:-36px;background:transparent;border:none;color:var(--c-ai-label);font-size:16px;cursor:pointer;padding:6px;border-radius:6px;opacity:0;transition:all .2s}
.msg-b.user:hover .btn-copy-user{opacity:1}
.msg-b.user .btn-copy-user:hover{background:var(--c-divider);color:var(--c-chat-header-text)}

/* AI 消息头部 + 按钮并排 */
.msg-b.ai{align-items:flex-start}
.msg-ai-header{display:flex;justify-content:flex-start;align-items:center;gap:12px;width:100%;margin-bottom:8px}
.msg-ai-actions{display:flex;flex-direction:row;gap:8px;align-items:center}
.msg-b .lbl{font-size:13px;font-weight:600;color:var(--c-chat-header-text);display:flex;align-items:center;gap:8px}
.msg-b .btn-copy-large,.msg-b .btn-comment{margin:0!important;display:inline-flex;align-items:center;background:var(--c-btn-copy-bg);border:1px solid var(--c-divider);color:var(--c-btn-copy-text);font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:6px;transition:all .2s}
.msg-b .btn-copy-large:hover,.msg-b .btn-comment:hover{border-color:var(--c-input-focus);color:var(--c-input-focus);background:var(--c-chat-bg)}
.msg-b .btn-copy-large.copied,.msg-b .btn-comment.copied{background:#ecfdf5!important;border-color:#10b981!important;color:#059669!important}

/* 4. 强力击穿 AUI 样式污染 & 极致排版升级 */
.msg-b.ai .wb-ai-content { 
  background: transparent !important; 
  width: 100% !important; 
  padding: 0 4px !important; 
  font-size: 1em !important; 
  line-height: 1.65 !important; 
  letter-spacing: 0.3px !important; 
}

/* 核心加固：统一接管所有文本色彩，防止 AUI 强行黑字 */
.msg-b.ai .wb-ai-content,
.msg-b.ai .wb-ai-content p,
.msg-b.ai .wb-ai-content span,
.msg-b.ai .wb-ai-content strong,
.msg-b.ai .wb-ai-content li,
.msg-b.ai .wb-ai-content td {
  color: var(--c-ai-text) !important;
}
.msg-b.ai .wb-ai-content h2,
.msg-b.ai .wb-ai-content h3,
.msg-b.ai .wb-ai-content h4,
.msg-b.ai .wb-ai-content th {
  color: var(--c-chat-header-text) !important;
}

/* 修复超链接在深色模式下看不见 */
.msg-b.ai .wb-ai-content a {
  color: var(--c-input-focus) !important;
  text-decoration: none !important;
}
.msg-b.ai .wb-ai-content a:hover {
  text-decoration: underline !important;
}

.msg-b.ai .wb-ai-content h2 { 
  font-size: 1.35em !important; font-weight: 700 !important; 
  margin: 1.5em 0 0.6em !important; padding-bottom: 6px !important;
  border-bottom: 1px solid var(--c-divider) !important;
}
.msg-b.ai .wb-ai-content h3 { font-size: 1.15em !important; font-weight: 600 !important; margin: 1.2em 0 0.4em !important; }
.msg-b.ai .wb-ai-content h4 { font-size: 1.05em !important; font-weight: 600 !important; margin: 1em 0 0.3em !important; }
.msg-b.ai .wb-ai-content p { margin: 0.6em 0 !important; }

.msg-b.ai .wb-ai-content ul, .msg-b.ai .wb-ai-content ol { margin: 0.5em 0 !important; padding-left: 1.6em !important; }
.msg-b.ai .wb-ai-content li { margin: 6px 0 !important; }
.msg-b.ai .wb-ai-content li::marker { color: var(--c-ai-label) !important; }

.msg-b.ai .wb-ai-content blockquote { 
  border-left: 4px solid var(--c-divider) !important; 
  margin: 0.8em 0 !important; padding: 6px 16px !important; 
  background: rgba(128, 128, 128, 0.05) !important; 
  border-radius: 0 8px 8px 0 !important;
}
.msg-b.ai .wb-ai-content blockquote p { color: var(--c-ai-label) !important; font-style: italic !important; }

/* 表格强制重围 */
.msg-b.ai .wb-ai-content table {
  width: 100% !important; border-collapse: collapse !important; margin: 0.8em 0 !important; font-size: 0.95em !important;
}
.msg-b.ai .wb-ai-content th {
  background: var(--c-code-bg) !important; padding: 10px 12px !important;
  border: 1px solid var(--c-divider) !important; font-weight: 600 !important;
}
.msg-b.ai .wb-ai-content td {
  padding: 10px 12px !important; border: 1px solid var(--c-divider) !important;
}
.msg-b.ai .wb-ai-content tr:nth-child(even) td {
  background: rgba(128, 128, 128, 0.04) !important;
}

/* 代码块防穿透：击穿 Jira AUI code 默认白底 */
.msg-b.ai .wb-ai-content pre { 
  background: var(--c-code-bg) !important; 
  padding: 14px 16px !important; border-radius: 8px !important; 
  border-left: 3px solid var(--c-user-bubble) !important; 
  overflow-x: auto !important; margin: 0.8em 0 !important; 
}
.msg-b.ai .wb-ai-content pre code { 
  background: transparent !important; /* 强制透明，继承外层 pre 底色 */
  color: var(--c-ai-text) !important; padding: 0 !important;
  font-family: "Cascadia Code", Menlo, Monaco, monospace !important;
  font-size: 0.9em !important; white-space: pre !important;
}
.msg-b.ai .wb-ai-content code {
  background: var(--c-code-bg) !important; padding: 2px 6px !important; border-radius: 4px !important;
  font-family: "Cascadia Code", Menlo, Monaco, monospace !important; font-size: 0.9em !important;
  color: #ef4444 !important;
}

/* 5. 输入卡片 */
.chat-input-card{background:var(--c-input-card);padding:16px 24px 24px;border-top:1px solid var(--c-divider);flex-shrink:0}
.chat-input-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap; 
  padding-bottom: 4px;
  align-items: center;
  overflow: visible !important; 
}
.chat-input-toolbar .toolbar-chip{background:var(--c-chip-bg);border:1px solid transparent;color:var(--c-chip-text);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.chat-input-toolbar .toolbar-chip:hover{background:var(--c-chip-hover);color:var(--c-chat-header-text)}
.chat-input-row{display:flex;gap:12px;align-items:flex-end;background:var(--c-input-bg);border:1px solid var(--c-input-border);border-radius:16px;padding:6px 6px 6px 16px;transition:all .2s}
.chat-input-row:focus-within{border-color:var(--c-input-focus);box-shadow:0 0 0 2px rgba(87,157,255,.2)}
.chat-input-row textarea{flex:1;border:none;background:transparent;padding:10px 0;font-size:14px;line-height:1.5;outline:none;resize:none;max-height:150px;color:var(--c-chat-header-text)!important;font-family:inherit}
.chat-input-right{display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-self:flex-end}
.send-icon-btn{display:flex;align-items:center;justify-content:center;padding:10px;min-width:40px;min-height:40px;border-radius:12px;background:var(--c-send-btn);color:var(--c-send-text);border:none;cursor:pointer;transition:transform .2s}
.send-icon-btn:hover{transform:scale(1.05);opacity:.9}
.stop-icon-btn{display:none;align-items:center;justify-content:center;padding:10px;min-width:40px;min-height:40px;border-radius:12px;background:#ef4444;color:#fff;border:none;cursor:pointer;transition:transform .2s}
.stop-icon-btn.show{display:flex}
.stop-icon-btn:hover{transform:scale(1.05);opacity:.9}
.send-icon-btn.hidden{display:none}

/* 6. 杂项 */
.theme-toggle{background:transparent;border:1px solid var(--c-divider);color:var(--c-chat-header-text);font-size:12px;cursor:pointer;padding:4px 10px;border-radius:6px;transition:all .2s}
.theme-toggle:hover{background:var(--c-issue-bg)}
.role-dropdown{position:relative;margin-left:auto}
.role-btn-sm{background:transparent;color:var(--c-ai-label);border:1px solid var(--c-divider);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.role-btn-sm:hover{background:var(--c-input-bg);color:var(--c-chat-header-text)}
/* 角色菜单：绝对定位上拉弹出 */
.role-menu{position:absolute;bottom:100%;right:0;margin-bottom:8px;min-width:140px;background:var(--c-input-card);border:1px solid var(--c-divider);border-radius:8px;overflow:hidden;z-index:100;box-shadow:0 8px 24px rgba(9,30,66,.15)}
.role-menu .role-item{display:block;width:100%;padding:10px 16px;font-size:13px;text-align:left;border:none;background:transparent;color:var(--c-ai-text);cursor:pointer;font-weight:500;transition:all .15s}
.role-menu .role-item:hover{background:var(--c-input-bg);color:var(--c-input-focus)}
.role-menu .role-divider{height:1px;background:var(--c-divider);margin:4px 0}
.typing{padding:10px 8px;font-size:13px;color:var(--c-ai-label);display:flex;align-items:center;gap:6px}

/* 字号弹出菜单位置修正 */
.font-popup{position:absolute;top:38px;right:0;background:var(--c-input-card);border:1px solid var(--c-divider);border-radius:10px;padding:6px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;gap:4px}
.font-popup button{padding:6px 12px;border:1px solid var(--c-divider);border-radius:6px;background:var(--c-input-bg);color:var(--c-ai-text);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:all .1s}
.font-popup button:hover{border-color:var(--c-input-focus)}
.font-popup button.active{background:var(--c-input-focus);color:#fff;border-color:var(--c-input-focus)}

/* ── UX 增强 ── */
/* 骨架屏 */
.skeleton{padding:24px 20px}
.skel-line{height:14px;background:var(--c-divider);border-radius:7px;margin-bottom:12px;animation:skelShimmer 1.5s infinite}
.skel-line:nth-child(2){width:75%}.skel-line:nth-child(3){width:50%}.skel-line:nth-child(4){width:85%}.skel-line:nth-child(5){width:35%}.skel-line:nth-child(6){width:60%;margin-top:16px}
@keyframes skelShimmer{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}

/* 滚到底部按钮 */
.scroll-bottom-btn{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);background:var(--c-input-card);border:1px solid var(--c-divider);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;color:var(--c-input-focus);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:5;animation:fadeUp .2s ease;display:none}
.scroll-bottom-btn.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Toast */
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--c-chat-header);color:var(--c-chat-header-text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;pointer-events:auto;border:1px solid var(--c-divider)}
.toast.ok{border-left:3px solid var(--success)}
.toast.err{border-left:3px solid var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}

/* 空状态引导 */
.hint-box{padding:20px}
.hint-box .example-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.hint-box .example-chip{background:var(--c-chip-bg);border:1px solid var(--c-divider);color:var(--c-input-focus);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.hint-box .example-chip:hover{background:var(--c-chip-hover);border-color:var(--c-input-focus)}

/* ── Jira 确认卡 UI（P0 安全增强，移植自白泽 Baize）── */
.confirm-card{background:var(--c-issue-bg);border:2px solid #f59e0b;border-radius:12px;padding:16px;margin:8px 0;box-shadow:0 2px 8px rgba(245,158,11,0.15);transition:opacity .3s}
.confirm-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.confirm-card-icon{font-size:20px}
.confirm-card-title{font-weight:700;font-size:14px;color:var(--c-chat-header-text)}
.confirm-card-badge{background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:auto}
.confirm-card-warnings{margin-bottom:12px}
.confirm-card-warning{background:#fef2f2;color:#991b1b;font-size:12px;padding:6px 10px;border-radius:6px;margin-bottom:4px}
.confirm-card-drafts{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.confirm-card-draft{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--c-code-bg);border-radius:8px;border:1px solid var(--c-divider)}
.draft-index{font-size:11px;font-weight:700;color:var(--c-ai-label);min-width:24px}
.draft-title{flex:1;font-size:13px;font-weight:500;color:var(--c-chat-header-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.draft-meta{font-size:11px;color:var(--c-ai-label);white-space:nowrap}
.confirm-card-actions{display:flex;gap:10px}
.confirm-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.confirm-btn-primary{background:#0052CC;color:#fff}
.confirm-btn-primary:hover{background:#0747A6}
.confirm-btn-secondary{background:var(--c-chip-bg);color:var(--c-chip-text);border:1px solid var(--c-divider)}
.confirm-btn-secondary:hover{background:var(--c-chip-hover)}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed}
.confirm-card-status{margin-top:10px;font-size:12px}
</style>

<!-- Markdown 渲染引擎：marked.js AST 编译 + DOMPurify 安全过滤 -->
<script>
window.wbMd = function(t) {
  if (!t) return '';
  try {
    if (window.marked && typeof window.marked.parse === 'function') {
      marked.setOptions({ breaks: true, gfm: true });
      var rawHtml = marked.parse(t);
      if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
        return window.DOMPurify.sanitize(rawHtml);
      }
      return rawHtml;
    }
  } catch(e) {
    console.warn('[WorkBuddy MD] Compiler warning, falling back:', e);
  }
  // 极简降级：无 CDN 时防卡死
  var h = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<p>' + h.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
};
function wbMd(t) { return window.wbMd(t); }
</script>

<!-- ═══ Chat Panel HTML ═══ -->
<div class="chat-header">
  <div style="display:flex;align-items:center;">
    <button class="btn-close-panel" onclick="if(window.wbStopTracker)window.wbStopTracker();if(window.parent&&window.parent.wbTogglePanel)window.parent.wbTogglePanel();else if(window.wbTogglePanel)window.wbTogglePanel();" title="收起面板">❮</button>
    🤖 Jira AI
  </div>
  <div style="display:flex;align-items:center;gap:8px;position:relative">
    <button class="theme-toggle" id="font-size-toggle" onclick="wbToggleFontMenu()" title="字体大小">A<span style="font-size:9px">A</span></button>
    <div class="font-popup" id="font-popup" style="display:none">
      <button onclick="wbSetFontSize(14)">标准</button>
      <button onclick="wbSetFontSize(16)" class="active">适中</button>
      <button onclick="wbSetFontSize(18)">较大</button>
      <button onclick="wbSetFontSize(21)">超大</button>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="wbToggleTheme()" title="切换深色模式">🌙</button>
    <button id="wb-clear-history" onclick="wbClearChat()" style="background:transparent;border:1px solid var(--c-divider);color:var(--c-chat-header-text);font-size:12px;cursor:pointer;padding:4px 12px;border-radius:6px;transition:background .2s" title="清空所有对话记录">🗑 清空</button>
  </div>
</div>
<div class="chat-issue" id="chat-issue">
  <span id="mode-icon">📋</span> <span id="mode-text" style="margin-right:6px;">当前任务：</span>
  <strong id="task-text-display" style="display:none;color:var(--c-user-bubble);font-size:14px;letter-spacing:0.5px;"></strong>
  <span id="task-input-wrapper">
    <input id="issue-key-input" class="issue-key-input" size="9" value="" placeholder="如 PROJECT-123">
    <button id="apply-issue" class="apply-issue-btn" onclick="window.wbApplyIssue()">应用</button>
  </span>
  <span id="global-text-wrapper" style="display:none;font-weight:600;color:var(--c-chat-header-text);">🌐 Jira 全局模式</span>
  
  <label id="task-toggle-wrapper" style="margin-left:auto;font-size:11px;color:var(--c-issue-text);cursor:pointer;user-select:none">
    <input type="checkbox" id="task-mode-toggle" checked onchange="window.wbToggleTaskMode()" style="vertical-align:middle;margin-right:3px">🔗 任务模式
  </label>
</div>
<div class="chat-body" id="chat-body">
  <div class="hint-box">👋 在下方输入问题，AI 将自动收集 Jira/SVN/Notion/Google Drive 上下文进行分析
    <div class="example-chips">
      <button class="example-chip" onclick="window.wbQuickAsk('这个任务的最近代码变更是什么？','')">📝 代码变更</button>
      <button class="example-chip" onclick="window.wbQuickAsk('分析当前任务的风险点','')">⚠️ 风险分析</button>
      <button class="example-chip" onclick="window.wbQuickAsk('查看关联的策划文档','')">📄 策划文档</button>
      <button class="example-chip" onclick="window.wbQuickAsk('总结这个任务的进度','')">📊 进度概览</button>
    </div>
  </div>
</div>
<div class="chat-input-card">
  <div class="chat-input-toolbar" id="chat-input-toolbar">
    <div class="role-dropdown" id="role-dropdown" style="margin-left:auto">
      <button class="role-btn role-btn-sm" id="role-btn" onclick="wbToggleRoleMenu()" title="切换角色">默认角色 ▾</button>
      <div class="role-menu" id="role-menu" style="display:none"></div>
      <input type="hidden" id="chat-role" value="-1">
    </div>
  </div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="问代码、需求、进度、风险..." rows="1" onkeydown="wbHandleInputKey(event)" oninput="wbAutoGrow(this)" onblur="wbShrinkIfEmpty(this)"></textarea>
    <div class="chat-input-right">
      <button class="send-icon-btn" id="wb-send-btn" onclick="wbSendChat()" title="发送 (Enter)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      <button class="stop-icon-btn" id="wb-stop-btn" onclick="wbStopChat()" title="停止生成"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  WorkBuddy AI — Shared Chat Dialog Script
//  挂载在 window.wbChat 命名空间下，避免冲突
// ═══════════════════════════════════════════════════
(function() {
  'use strict';

  var _abort = null,
      _lastQuestion = '', _conversationHistory = [],
      _messageHistory = [];  // 全部消息持久化

  // ═══ Current Issue & Mode Control ═══
  window.wbGetIssueKey = function() {
    var el = document.getElementById('issue-key-input');
    return el ? el.value.trim().toUpperCase() : '';
  };
  window.wbSetIssueKey = function(key) {
    var input = document.getElementById('issue-key-input');
    if (input) input.value = key || '';
    var wrapTask = document.getElementById('task-input-wrapper');
    var textDisplay = document.getElementById('task-text-display');
    var wrapGlobal = document.getElementById('global-text-wrapper');
    var modeIcon = document.getElementById('mode-icon');
    var modeText = document.getElementById('mode-text');

    // 🔍 环境嗅探 + 任务模式勾选框显隐控制
    var toggleWrapper = document.getElementById('task-toggle-wrapper');
    var topUrl = window.parent ? window.parent.location.href : window.location.href;
    var isAdminPage = topUrl.indexOf('wb-admin') !== -1;

    if (toggleWrapper) {
      toggleWrapper.style.display = isAdminPage ? 'inline-block' : 'none';
    }

    if (key) {
      if (wrapGlobal) wrapGlobal.style.display = 'none';
      if (modeIcon) modeIcon.textContent = '📋';
      if (modeText) modeText.textContent = '当前任务：';
      if (isAdminPage) {
        if (wrapTask) wrapTask.style.display = 'inline-block';
        if (textDisplay) textDisplay.style.display = 'none';
      } else {
        if (wrapTask) wrapTask.style.display = 'none';
        if (textDisplay) {
          textDisplay.textContent = key;
          textDisplay.style.display = 'inline-block';
        }
      }
    } else {
      if (wrapTask) wrapTask.style.display = 'none';
      if (textDisplay) textDisplay.style.display = 'none';
      if (wrapGlobal) wrapGlobal.style.display = 'inline-block';
      if (modeIcon) modeIcon.textContent = '';
      if (modeText) modeText.textContent = '';
    }
  };
  window.wbApplyIssue = function() {
    var val = window.wbGetIssueKey();
    if (!val) return;
    window.wbSetIssueKey(val);
    showToast('✅ 已切换到 ' + val, 'ok');
  };
  window._isTaskMode = true;
  window.wbToggleTaskMode = function() {
    var cb = document.getElementById('task-mode-toggle');
    window._isTaskMode = cb ? cb.checked : true;
    var wrapTask = document.getElementById('task-input-wrapper');
    var wrapGlobal = document.getElementById('global-text-wrapper');
    var modeIcon = document.getElementById('mode-icon');
    var modeText = document.getElementById('mode-text');
    if (window._isTaskMode) {
      var currentKey = window.wbGetIssueKey();
      window.wbSetIssueKey(currentKey);
    } else {
      if (wrapTask) wrapTask.style.display = 'none';
      if (wrapGlobal) wrapGlobal.style.display = 'inline-block';
      if (modeIcon) modeIcon.textContent = '🌐';
      if (modeText) modeText.textContent = '全局对话模式 (无特定工单上下文)';
    }
  };

  // convenience aliases for internal use
  function getIssueKey() { return window.wbGetIssueKey(); }
  function setIssueKey(key) { window.wbSetIssueKey(key); }

  (function initTheme() {
    if (localStorage.getItem('wb_theme') === 'dark') {
      var scope = document.querySelector('.wb-dialog-scope');
      if (scope) scope.setAttribute('data-theme', 'dark');
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = '☀️';
    }
  })();

  // ═══ Font ═══
  window.wbToggleFontMenu = function() {
    var p = document.getElementById('font-popup');
    if (p) p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
  };
  window.wbSetFontSize = function(size) {
    var body = document.getElementById('chat-body');
    if (body) body.style.fontSize = size + 'px';
    var fp = document.getElementById('font-popup');
    if (fp) fp.style.display = 'none';
    document.querySelectorAll('.font-popup button').forEach(function(b){ b.classList.remove('active'); });
    var btn = document.querySelector('.font-popup button[onclick*="'+size+'"]');
    if (btn) btn.classList.add('active');
    localStorage.setItem('wb_font_size', String(size));
  };
  (function initFontSize() {
    var s = parseInt(localStorage.getItem('wb_font_size')) || 16;
    setTimeout(function(){ window.wbSetFontSize(s); }, 50);
  })();

  // ═══ Role ═══
  window.wbToggleRoleMenu = function() {
    var m = document.getElementById('role-menu');
    if (m) m.style.display = m.style.display === 'block' ? 'none' : 'block';
  };
  window.wbSelectRole = function(idx, el) {
    document.getElementById('chat-role').value = String(idx);
    var btn = document.getElementById('role-btn');
    var roles = wbGetRoles();
    var name = idx === -1 ? '默认角色' : (roles[idx] ? roles[idx].name : '?');
    if (btn) btn.textContent = name + ' ▾';
    var menu = document.getElementById('role-menu');
    if (menu) menu.style.display = 'none';
  };

  function wbGetRoles() {
    try { return JSON.parse(localStorage.getItem('wb_roles')) || []; } catch(e) { return []; }
  }
  function wbGetActiveRole() {
    var idx = document.getElementById('chat-role') ? document.getElementById('chat-role').value : '-1';
    if (!idx || idx === '-1') return {name:'默认助手', prompt:'你是 Jira AI 助手。回答要求：1.使用 ## 二级标题作为大段落分隔，### 三级标题作为子项，#### 用于细节；2.用表格对比差异；3.用列表枚举要点；4.用代码块展示技术细节。', kb:{jira:true,svn:true,notion:true,gdrive:true}};
    var roles = wbGetRoles();
    return roles[parseInt(idx)] || {name:'默认助手', prompt:'你是 Jira AI 助手。', kb:{jira:true,svn:true,notion:true,gdrive:true}};
  }

  function wbRenderRoleSelector() {
    var menu = document.getElementById('role-menu');
    if (!menu) return;
    var roles = wbGetRoles();
    var h = '<button class="role-item" onclick="wbSelectRole(-1, this)">🤖 默认助手</button>';
    if (roles.length > 0) {
      h += '<div class="role-divider"></div>';
      roles.forEach(function(r, i){
        h += '<button class="role-item" onclick="wbSelectRole('+i+', this)">🎭 '+wbEscHtml(r.name||'未命名')+'</button>';
      });
    }
    menu.innerHTML = h;
  }

  // ═══ Quick Chips ═══
  function wbGetQuickConfig() {
    try { return JSON.parse(localStorage.getItem('wb_quick_config')) || []; } catch(e) { return []; }
  }
  function wbApplyQuickChips() {
    var bar = document.getElementById('chat-input-toolbar');
    if (!bar) return;
    bar.querySelectorAll('.toolbar-chip').forEach(function(c){c.remove();});
    var cfg = wbGetQuickConfig();
    cfg.forEach(function(q) {
      var chip = document.createElement('button');
      chip.className = 'toolbar-chip';
      chip.textContent = q.name || q.label || '?';
      chip.onclick = function(e) { e.preventDefault(); e.stopPropagation();
        wbQuickAsk(q.user_message || q.name || '', q.system_prompt || q.prompt || '');
      };
      var rd = bar.querySelector('.role-dropdown');
      if (rd) bar.insertBefore(chip, rd);
      else bar.appendChild(chip);
    });
  }

  // ═══ History Persistence ═══
  var _historyKey = (function(){
    var u = window._wbUser || 'anonymous';
    // 规范化：去除特殊字符，防止 key 冲突
    u = u.replace(/[^a-zA-Z0-9_.@-]/g, '_').substring(0, 50);
    return 'wb_chat_' + u;
  })();
  function saveHistory() {
    try { localStorage.setItem(_historyKey, JSON.stringify(_messageHistory)); } catch(e) {}
  }
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(_historyKey)) || []; } catch(e) { return []; }
  }
  function restoreHistory() {
    _messageHistory = loadHistory();
    var body = document.getElementById('chat-body');
    if (!body || _messageHistory.length === 0) return;

    window._isRestoringHistory = true; 
    body.innerHTML = '';

    _conversationHistory = [];
    var lastQ = null;
    for (var i = 0; i < _messageHistory.length; i++) {
      var m = _messageHistory[i];
      if (m.role === 'user') {
        wbAddChat('user', m.content);
        lastQ = m.content;
      } else if (m.role === 'ai') {
        wbCreateAiBubbleStatic(m.content, m.html || m.content);
        if (lastQ) {
          _conversationHistory.push({q: lastQ, a: m.content || ''});
          lastQ = null;
        }
      }
    }
    while (_conversationHistory.length > 10) { _conversationHistory.shift(); }

    function lockScroll() { if (body) body.scrollTop = body.scrollHeight; }
    lockScroll();
    requestAnimationFrame(function() {
      lockScroll();
      setTimeout(lockScroll, 50);
      setTimeout(lockScroll, 200);
      setTimeout(lockScroll, 500);
      setTimeout(function(){ window._isRestoringHistory = false; }, 600);
    });
  }

  // ═══ Input helpers ═══
  window.wbAutoGrow = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  };
  window.wbShrinkIfEmpty = function(el) {
    if (!el.value.trim()) { el.style.height = ''; el.style.minHeight = ''; }
  };
  window.wbHandleInputKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); wbSendChat(); }
    // Shift+Enter 换行：不做任何拦截，浏览器默认行为
  };

  // ═══ Global keyboard shortcuts ═══
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var overlay = document.getElementById('wb-chat-overlay');
      if (overlay && overlay.classList.contains('wb-show')) {
        if (window.wbStopTracker) window.wbStopTracker();
        if (window.parent && window.parent.wbTogglePanel) window.parent.wbTogglePanel();
        else if (window.wbTogglePanel) window.wbTogglePanel();
      }
    }
  });

  // ═══ Quick Ask ═══
  function wbQuickAsk(text, extraSystem) {
    if (_abort) return;
    var inp = document.getElementById('chat-input');
    if (inp) { inp.value = text; window.wbAutoGrow(inp); }
    wbSendChatInternal(text, extraSystem);
  }
  window.wbQuickAsk = wbQuickAsk;

  // ═══ Theme + Clear ═══
  window.wbToggleTheme = function() {
    var scope = document.querySelector('.wb-dialog-scope');
    if (!scope) return;
    var isDark = scope.getAttribute('data-theme') === 'dark';

    function applyTheme() {
      scope.setAttribute('data-theme', isDark ? '' : 'dark');
      localStorage.setItem('wb_theme', isDark ? 'light' : 'dark');
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = isDark ? '🌙' : '☀️';
    }

    // 🚀 View Transitions API: GPU 图像级快照淡入淡出，零 CSSOM 重绘
    if (document.startViewTransition) {
      document.startViewTransition(applyTheme);
    } else {
      applyTheme();
    }
  };
  window.wbClearChat = function() {
    if (_messageHistory.length > 0) {
      if (!confirm('确定要清空所有对话记录吗？此操作不可撤销。')) return;
    }
    _conversationHistory = [];
    _messageHistory = [];
    try { localStorage.removeItem(_historyKey); } catch(e) {}
    var body = document.getElementById('chat-body');
    if (body) body.innerHTML = '<div class="hint-box">👋 对话已清空，在下方输入问题</div>';
  };
  window.wbApplyQuickChips = function(chips) {
    if (!chips || !chips.length) {
      try { chips = JSON.parse(localStorage.getItem('wb_quick_config')) || []; } catch(e) { chips = []; }
    }
    var dialogToolbar = document.querySelector('.wb-dialog-scope #chat-input-toolbar');
    var bar = dialogToolbar || document.getElementById('chat-input-toolbar');
    if (!bar) return;
    bar.querySelectorAll('.qchip').forEach(function(c){ c.remove(); });
    var dd = bar.querySelector('.role-dropdown');
    (chips || []).forEach(function(item){
      if (item._expanded === true) return;
      var btn = document.createElement('button');
      btn.className = 'toolbar-chip qchip';
      btn.textContent = item.name || '未命名';
      btn.onclick = function(e) {
        e.preventDefault(); e.stopPropagation();
        if (window.wbQuickAsk) window.wbQuickAsk(item.user_message, item.system_prompt);
      };
      if (dd) bar.insertBefore(btn, dd);
      else bar.appendChild(btn);
    });
  };

  // ─── 发送状态管理（对齐 test_suite 参考：只用 _abort 标识请求进行中） ──
  // _abort !== null → 请求进行中 → 阻止任何新发送、允许停止
  // _abort === null → 空闲状态 → 可以发送

  function wbToggleSendStop(isStreaming) {
    var sendBtn = document.getElementById('wb-send-btn');
    var stopBtn = document.getElementById('wb-stop-btn');
    if (sendBtn && stopBtn) {
      if (isStreaming) { sendBtn.classList.add('hidden'); stopBtn.classList.add('show'); }
      else { sendBtn.classList.remove('hidden'); stopBtn.classList.remove('show'); }
    }
  }

  // ═══ Stop Chat ═══
  window.wbStopChat = function() {
    if (_abort) { _abort.abort(); _abort = null; }
    window._isStreaming = false;
    var body = document.getElementById('chat-body');
    if (body) {
      var bubbles = body.querySelectorAll('.msg-b.ai .wb-ai-content');
      if (bubbles.length > 0) {
        var last = bubbles[bubbles.length - 1];
        if (last.textContent.indexOf('思考中') !== -1) {
          var parent = last.closest('.msg-b.ai');
          if (parent) parent.remove();
        }
      }
    }
    wbToggleSendStop(false);
    showToast('⏹ 已停止生成', 'ok');
  };

  window.wbRetryChat = function() {
    if (!_lastQuestion || _abort) return;
    var body = document.getElementById('chat-body');
    if (body) {
      var bubbles = body.querySelectorAll('.msg-b.ai');
      if (bubbles.length > 0) { bubbles[bubbles.length - 1].remove(); }
    }
    if (_messageHistory.length > 0 && _messageHistory[_messageHistory.length - 1].role === 'ai') {
      _messageHistory.pop();
    }
    saveHistory();
    wbSendChatInternal(_lastQuestion, '');
  };

  // ═══ Send Chat ═══
  window.wbSendChat = function() {
    if (_abort) return;  // 请求进行中 → 静默忽略（点停止按钮来中断）
    var inp = document.getElementById('chat-input');
    var text = inp ? inp.value.trim() : '';
    if (!text) return;
    if (inp) { inp.value = ''; inp.style.height = ''; inp.style.minHeight = ''; }
    wbSendChatInternal(text, '');
  };

  function wbSendChatInternal(text, extraSystem) {
    if (!text || _abort) return;
    _lastQuestion = text;
    wbAddChat('user', text);
    _messageHistory.push({role:'user', content:text}); saveHistory();

    window._isStreaming = true;
    wbToggleSendStop(true);

    var role = wbGetActiveRole() || {name:'默认',prompt:'你是Jira AI助手，帮助用户分析和解决问题。',kb:{jira:true,svn:true,notion:true,gdrive:true}};
    var kb = (role && role.kb) || {jira:true,svn:true,notion:true,gdrive:true};

    var sysMsg = '';
    if (extraSystem) { sysMsg = extraSystem + '\n---\n'; }
    else { sysMsg = role.prompt + '\n---\n'; }
    var kbs = [];
    if (kb.jira) kbs.push('Jira'); if (kb.svn) kbs.push('SVN');
    if (kb.notion) kbs.push('Notion'); if (kb.gdrive) kbs.push('GDrive');
    sysMsg += '可用知识库: ' + kbs.join(',') + '\n';
    try { if (getIssueKey()) { sysMsg += 'Issue:\nKey: '+getIssueKey()+'\n---\n'; } } catch(e) {}
    sysMsg += '简洁回答，用Markdown格式。';
    if (_conversationHistory.length > 0) {
      sysMsg += '\n\n--- 对话历史 ---\n';
      _conversationHistory.forEach(function(h, i){
        sysMsg += '用户问'+(i+1)+': '+h.q+'\nAI答'+(i+1)+': '+(h.a||'').substring(0,400)+'\n';
      });
      sysMsg += '当前问题是上述对话的追问，请结合上下文回答。';
    }

    _abort = new AbortController();
    var apiUrl = window.wbChatApiEndpoint || '/plugins/servlet/wb/chat';

    var bubble = wbCreateAiBubble();
    var fullReply = '';
    var hasStarted = false;

    var _streamTimeout = setTimeout(function() {
      if (_abort) { _abort.abort(); _abort = null; }
      window._isStreaming = false; wbToggleSendStop(false);
      if (bubble && bubble.contentEl && !fullReply) {
        bubble.contentEl.innerHTML = '<div style="color:#ef4444;padding:8px 0">⚠️ 请求超时（90s），请重试</div>'
          + '<button onclick="window.wbRetryChat()" style="margin-top:8px;padding:6px 16px;border:1px solid var(--c-divider);border-radius:6px;background:var(--c-input-bg);color:var(--c-input-focus);cursor:pointer;font-size:13px;font-weight:600">🔄 重试</button>';
      }
    }, 90000);

    fetch(apiUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      signal: _abort.signal,
      body:JSON.stringify({messages:[
        {role:'system', content:sysMsg},
        {role:'user', content:text}
      ]})
    })
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP '+response.status);
      var reader = response.body.getReader();
      var decoder = new TextDecoder('utf-8');
      var buffer = '';

      function processStream() {
        return reader.read().then(function(res) {
          if (res.done) return;
          buffer += decoder.decode(res.value, {stream: true});
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.indexOf('data: ') !== 0) continue;
            var jsonStr = line.substring(6).trim();
            if (jsonStr === '[DONE]') continue;
            try {
              var chunk = JSON.parse(jsonStr);
              // ── 确认卡事件处理（P0 安全增强，移植自白泽 Baize）──
              if (chunk._event === 'confirm_card' && chunk.operation) {
                hasStarted = true;
                wbShowConfirmCard(chunk.operation, bubble.contentEl);
                return;
              }
              // ── 意图信息提取 ──
              if (chunk._intent && chunk._intent.route) {
                // 前端可据此调整UI行为，暂存入 bubble 属性
                bubble._intent = chunk._intent;
              }
              var content = chunk.choices && chunk.choices[0] && chunk.choices[0].delta ? (chunk.choices[0].delta.content || '') : '';
              if (content) {
                if (!hasStarted) { hasStarted = true; bubble.contentEl.innerHTML = ''; }
                fullReply += content;
                bubble.contentEl.innerHTML = wbMd(fullReply);
              }
            } catch(e) {}
          }
          return processStream();
        });
      }
      return processStream();
    })
    .then(function() {
      clearTimeout(_streamTimeout);
      _abort = null; window._isStreaming = false; wbToggleSendStop(false);
      if (fullReply) {
        bubble.contentEl.innerHTML = wbMd(fullReply);
        bubble.contentEl.setAttribute('data-md', fullReply);
        if (bubble.cpBtn) bubble.cpBtn.style.display = 'inline-flex';
        if (bubble.ccBtn) bubble.ccBtn.style.display = 'inline-flex';
      } else {
        bubble.contentEl.innerHTML = '<div style="color:#f59e0b;padding:8px 0">⚠️ AI 无返回内容</div>'
          + '<button onclick="window.wbRetryChat()" style="margin-top:8px;padding:6px 16px;border:1px solid var(--c-divider);border-radius:6px;background:var(--c-input-bg);color:var(--c-input-focus);cursor:pointer;font-size:13px;font-weight:600">🔄 重试</button>';
      }
      wbSmartScroll();
      _conversationHistory.push({q:_lastQuestion, a:fullReply});
      if (_conversationHistory.length > 10) _conversationHistory.shift();
      _messageHistory.push({role:'ai', content:fullReply, html: bubble.contentEl.innerHTML});
      saveHistory();
      setTimeout(function(){ wbInjectCodeCopy(bubble.el); }, 100);
    })
    .catch(function(e){
      clearTimeout(_streamTimeout);
      _abort = null; window._isStreaming = false; wbToggleSendStop(false);
      if (e && e.name !== 'AbortError' && bubble && bubble.contentEl) {
        bubble.contentEl.innerHTML = '<div style="color:#ef4444;padding:8px 0">⚠️ ' + (e.message || '未知错误') + '</div>'
          + '<button onclick="window.wbRetryChat()" style="margin-top:8px;padding:6px 16px;border:1px solid var(--c-divider);border-radius:6px;background:var(--c-input-bg);color:var(--c-input-focus);cursor:pointer;font-size:13px;font-weight:600">🔄 重试</button>';
      }
    });
  }

  // Bridge URL 智能默认
  function getBridgeUrlDefault() {
    if (window.wbBridgeUrl) return window.wbBridgeUrl;
    var host = window.location.hostname;
    return (host === 'localhost' || host === '127.0.0.1') ? 'http://localhost:9099' : 'http://' + host + ':9099';
  }

  // 检查 AI Bridge 健康状态
  window.wbCheckBridge = function() {
    var bridgeUrl = getBridgeUrlDefault();
    var bubble = document.querySelector('.msg-b.ai:last-child .wb-ai-content');
    if (bubble) bubble.innerHTML = '<div style="color:#2563eb">🔍 正在检查 AI Bridge...</div>';
    fetch(bridgeUrl + '/health')
      .then(function(r){ return r.json(); })
      .then(function(d) {
        if (bubble) bubble.innerHTML = '<div style="color:#16a34a">✅ AI Bridge 正常<br><span style="font-size:12px;color:var(--c-ai-label)">引擎:' + (d.engine||'?') + ' | 版本:' + (d.service||'?') + '</span></div>';
      })
      .catch(function() {
        if (bubble) bubble.innerHTML = '<div style=\"color:#ef4444\">❌ AI Bridge (' + getBridgeUrlDefault() + ') 未连接</div>';
      });
  };

  // ═══ Streaming Bubble Helper ═══
  function wbCreateAiBubble() {
    var d = document.createElement('div'); d.className = 'msg-b ai';
    var headerRow = document.createElement('div'); headerRow.className = 'msg-ai-header';
    var l = document.createElement('div'); l.className = 'lbl'; l.textContent = '🤖 Jira AI'; headerRow.appendChild(l);

    var actions = document.createElement('div'); actions.className = 'msg-ai-actions';
    var cp = document.createElement('button'); cp.className = 'btn-copy-large'; cp.textContent = '📋 复制';
    cp.style.display = 'none';
    cp.onclick = function() {
      var raw = (cnt && cnt.getAttribute('data-md')) || (cnt && cnt.innerText) || '';
      wbCopyText(raw); cp.textContent = '✓ 已复制'; cp.classList.add('copied');
      setTimeout(function(){ cp.textContent = '📋 复制'; cp.classList.remove('copied'); }, 2000);
    };
    var cc = document.createElement('button'); cc.className = 'btn-comment'; cc.textContent = '💬 贴为评论';
    cc.style.display = 'none';
    cc.onclick = function() {
      var a = (cnt && cnt.getAttribute('data-md')) || '';
      if (!a.trim()) return;
      cc.textContent = '⏳ 发布中...'; cc.disabled = true;
      var bridgeUrl = getBridgeUrlDefault();
      fetch(bridgeUrl + '/proxy/jira/comment', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({issue_key:getIssueKey(), question:_lastQuestion||'', answer:a})
      }).then(function(r){return r.json();}).then(function(dd){
        if (dd.ok) { cc.textContent = '✅ 已加入评论'; cc.classList.add('copied'); cc.disabled = true; }
        else { cc.textContent = '❌ '+(dd.error||'失败'); cc.classList.add('fail');
          setTimeout(function(){ cc.textContent = '💬 贴为评论'; cc.classList.remove('fail'); cc.disabled = false; }, 4000); }
      }).catch(function(){ cc.textContent = '❌ 网络错误'; cc.classList.add('fail');
        setTimeout(function(){ cc.textContent = '💬 贴为评论'; cc.classList.remove('fail'); cc.disabled = false; }, 4000); });
    };

    actions.appendChild(cp); actions.appendChild(cc);
    headerRow.appendChild(actions); d.appendChild(headerRow);

    var cnt = document.createElement('div'); cnt.className = 'wb-ai-content';
    cnt.innerHTML = '<div class="typing" style="padding:0">🤔 思考中 <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    d.appendChild(cnt);

    var bodyEl = document.getElementById('chat-body');
    if (bodyEl) { bodyEl.appendChild(d); if (!window._isRestoringHistory) bodyEl.scrollTop = bodyEl.scrollHeight; }

    return {el: d, contentEl: cnt, cpBtn: cp, ccBtn: cc};
  }

  // 静态 AI 气泡 — 用于恢复历史消息（无流式动画）
  function wbCreateAiBubbleStatic(content, html) {
    var d = document.createElement('div'); d.className = 'msg-b ai';
    var cp = document.createElement('button'); cp.className = 'btn-copy-large'; cp.textContent = '📋 复制';
    cp.onclick = function() {
      wbCopyText(content); cp.textContent = '✓ 已复制'; cp.classList.add('copied');
      setTimeout(function(){ cp.textContent = '📋 复制'; cp.classList.remove('copied'); }, 2000);
    };
    var headerRow = document.createElement('div'); headerRow.className = 'msg-ai-header';
    var l = document.createElement('div'); l.className = 'lbl'; l.textContent = '🤖 Jira AI'; headerRow.appendChild(l);
    var actions = document.createElement('div'); actions.className = 'msg-ai-actions';
    actions.appendChild(cp); headerRow.appendChild(actions);
    d.appendChild(headerRow);
    var cnt = document.createElement('div'); cnt.className = 'wb-ai-content';
    cnt.innerHTML = html || content;
    d.appendChild(cnt);
    var bodyEl = document.getElementById('chat-body');
    if (bodyEl) bodyEl.appendChild(d);
  }

  // ═══ Render ═══
  function wbAddChat(role, content, raw) {
    var d = document.createElement('div'); d.className = 'msg-b ' + role;
    if (role === 'user') {
      var cnt = document.createElement('div'); cnt.className = 'msg-content'; cnt.textContent = content; d.appendChild(cnt);
      var ucp = document.createElement('button'); ucp.className = 'btn-copy-user'; ucp.textContent = '📋';
      ucp.title = '复制';
      ucp.onclick = function(e){ e.stopPropagation();
        wbCopyText(content); this.textContent = '✓'; var s = this; setTimeout(function(){ s.textContent = '📋'; }, 1500); };
      d.appendChild(ucp);
    } else {
      var headerRow = document.createElement('div'); headerRow.className = 'msg-ai-header';
      var l = document.createElement('div'); l.className = 'lbl'; l.textContent = '🤖 Jira AI'; headerRow.appendChild(l);
      var actions = document.createElement('div'); actions.className = 'msg-ai-actions';
      if (!content.startsWith('⏹') && !content.startsWith('⚠️')) {
        var cp = document.createElement('button'); cp.className = 'btn-copy-large'; cp.textContent = '📋 复制';
        cp.setAttribute('data-md', raw || content || '');
        cp.onclick = function(){ var md = this.getAttribute('data-md') || '';
          wbCopyText(md); this.textContent = '✓ 已复制'; this.classList.add('copied');
          var s = this; setTimeout(function(){ s.textContent = '📋 复制'; s.classList.remove('copied'); }, 2000); };
        actions.appendChild(cp);
        var cc = document.createElement('button'); cc.className = 'btn-comment'; cc.textContent = '💬 贴为评论';
        cc.setAttribute('data-q', _lastQuestion || ''); cc.setAttribute('data-a', raw || content || '');
        cc.onclick = function(){ var q = this.getAttribute('data-q') || '', a = this.getAttribute('data-a') || '';
          if (!a) return; this.textContent = '⏳ 发布中...'; this.disabled = true;
          var bridgeUrl = getBridgeUrlDefault();
          fetch(bridgeUrl + '/proxy/jira/comment', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({issue_key:getIssueKey(), question:q, answer:a})
          }).then(function(r){return r.json();}).then(function(dd){
            if (dd.ok) { cc.textContent = '✅ 已加入评论'; cc.classList.add('copied'); cc.disabled = true; showToast('已成功贴为 Jira 评论', 'ok'); }
            else { cc.textContent = '❌ 失败'; cc.classList.add('fail');
              setTimeout(function(){ cc.textContent = '💬 贴为评论'; cc.classList.remove('fail'); cc.disabled = false; }, 3000); }
          }).catch(function(){ cc.textContent = '❌ 网络错误'; cc.classList.add('fail');
            setTimeout(function(){ cc.textContent = '💬 贴为评论'; cc.classList.remove('fail'); cc.disabled = false; }, 3000); });
        };
        actions.appendChild(cc);
      }
      headerRow.appendChild(actions);
      d.appendChild(headerRow);
      var cnt = document.createElement('div'); cnt.innerHTML = content; d.appendChild(cnt);
      wbInjectCodeCopy(d);
    }
    var body = document.getElementById('chat-body');
    if (body) { body.appendChild(d); if (!window._isRestoringHistory) body.scrollTop = 99999; }
  }

  function wbInjectCodeCopy(container) {
    container.querySelectorAll('pre').forEach(function(pre){
      if (pre.querySelector('.btn-copy-code')) return;
      var btn = document.createElement('button'); btn.className = 'btn-copy-code'; btn.textContent = '复制';
      btn.onclick = function(){ var code = pre.querySelector('code'); var t = code ? code.innerText : pre.innerText;
        wbCopyText(t); btn.textContent = '✓'; setTimeout(function(){ btn.textContent = '复制'; }, 1500); };
      pre.style.position = 'relative'; pre.appendChild(btn);
    });
  }

  // ═══ Markdown ═══
  function wbEscHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // 统一复制函数：优先 Clipboard API，降级到 execCommand
  function wbCopyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(function() {
        // 降级
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, 99999);
        document.execCommand('copy'); document.body.removeChild(ta);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, 99999);
      document.execCommand('copy'); document.body.removeChild(ta);
    }
  }


  // ═══ Issue Tracker (Jira 动态切换嗅探器) ═══
  var _lastTrackedKey = '';
  var _trackerInterval = null;
  function startIssueTracker() {
    if (_trackerInterval) clearInterval(_trackerInterval);
    _trackerInterval = setInterval(function() {
      // 万能正则：非捕获组隔离所有前缀，工单 KEY 永远在 m[1]
      var m = window.location.href.match(/(?:\/browse\/|selectedIssue=|\/issues\/|item\/)([A-Z][A-Z0-9]*-\d+)/i);
      var currentUrlKey = m ? m[1].toUpperCase() : '';
      if (currentUrlKey && currentUrlKey !== _lastTrackedKey) {
        _lastTrackedKey = currentUrlKey;
        if (getIssueKey() !== currentUrlKey) {
          setIssueKey(currentUrlKey);
          var el = document.getElementById('issue-key-input');
          if (el) {
            el.style.transition = 'background-color 0.3s';
            el.style.backgroundColor = 'var(--c-issue-border)';
            setTimeout(function(){ el.style.backgroundColor = ''; }, 600);
          }
        }
      }
    }, 500);
  }
  window.wbStopTracker = function() {
    if (_trackerInterval) { clearInterval(_trackerInterval); _trackerInterval = null; }
  };

  // ═══ Init ═══
  function wbInit() {
    restoreHistory();  
    wbRenderRoleSelector();
    setTimeout(function() { window.wbApplyQuickChips(); }, 100);
    startIssueTracker();
    setTimeout(createScrollBtn, 500);

    // DOM 突变盯底引擎：流式输出和图片加载时自动咬死在底部
    var body = document.getElementById('chat-body');
    if (body) {
      function snapToBottom() {
        if (!window._isRestoringHistory && window._isStreaming) {
          body.scrollTop = body.scrollHeight;
        }
      }
      if (window.ResizeObserver) {
        var ro = new ResizeObserver(snapToBottom);
        ro.observe(body);
      }
      var mo = new MutationObserver(snapToBottom);
      mo.observe(body, { childList: true, subtree: true, characterData: true });
    }
  }

  // ═══ UX Helpers ═══
  function showToast(msg, type) {
    var c = document.getElementById('toast-container');
    if (!c) { c = document.createElement('div'); c.id = 'toast-container'; c.className = 'toast-container'; document.body.appendChild(c); }
    var t = document.createElement('div'); t.className = 'toast ' + (type||'');
    t.textContent = msg; c.appendChild(t);
    setTimeout(function(){ t.remove(); }, 3000);
  }

  function showSkeleton() {
    var body = document.getElementById('chat-body');
    if (!body) return;
    body.innerHTML = '<div class="skeleton">' +
      '<div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div>' +
      '<div class="skel-line"></div><div class="skel-line"></div><div class="skel-line"></div></div>';
  }

  function createScrollBtn() {
    if (document.getElementById('scroll-bottom-btn')) return;
    var btn = document.createElement('button');
    btn.id = 'scroll-bottom-btn'; btn.className = 'scroll-bottom-btn'; btn.textContent = '↓ 最新';
    btn.onclick = function() { var b = document.getElementById('chat-body'); if (b) b.scrollTop = b.scrollHeight; };
    var overlay = document.getElementById('wb-chat-overlay') || document.querySelector('.chat-drawer');
    if (overlay) overlay.appendChild(btn);
  }

  // 监听聊天区滚动显示/隐藏滚底按钮
  document.addEventListener('scroll', function(e) {
    var body = document.getElementById('chat-body');
    var btn = document.getElementById('scroll-bottom-btn');
    if (!body || !btn) return;
    var dist = body.scrollHeight - body.scrollTop - body.clientHeight;
    if (dist > 200) btn.classList.add('show');
    else btn.classList.remove('show');
  }, true);
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('role-dropdown');
    if (dd && !dd.contains(e.target)) {
      var rm = document.getElementById('role-menu');
      if (rm) rm.style.display = 'none';
    }
    var fp = document.getElementById('font-popup');
    var fb = document.getElementById('font-size-toggle');
    if (fp && fb && !fb.contains(e.target) && !fp.contains(e.target)) {
      fp.style.display = 'none';
    }
  });

  // Wait for DOM
  if (document.readyState === 'complete' || document.readyState === 'interactive') wbInit();
  else document.addEventListener('DOMContentLoaded', wbInit);
  setTimeout(wbInit, 300);

  // ═══ Expose for external use ═══
  window.wbCopyText = wbCopyText;
  window.wbToggleSendStop = wbToggleSendStop;

  // ═══ Smart Scroll ═══
  function wbSmartScroll() {
    var body = document.getElementById('chat-body');
    if (!body) return;
    var distFromBottom = body.scrollHeight - body.scrollTop - body.clientHeight;
    if (distFromBottom < 150) body.scrollTop = body.scrollHeight;
  }
  window.wbSmartScroll = wbSmartScroll;

  // ═══ Jira 确认卡 UI（P0 安全增强，移植自白泽 Baize）═══
  function wbShowConfirmCard(operation, container) {
    var drafts = operation.drafts || [];
    var warnings = operation.warnings || [];
    var opId = operation.id;

    var html = '<div class="confirm-card" data-op-id="' + opId + '">';
    html += '<div class="confirm-card-header">';
    html += '<span class="confirm-card-icon">🛡️</span>';
    html += '<span class="confirm-card-title">Jira 操作确认</span>';
    html += '<span class="confirm-card-badge">' + drafts.length + ' 条</span>';
    html += '</div>';

    // 警告
    if (warnings.length > 0) {
      html += '<div class="confirm-card-warnings">';
      warnings.forEach(function(w) {
        html += '<div class="confirm-card-warning">⚠️ ' + wbEscapeHtml(w) + '</div>';
      });
      html += '</div>';
    }

    // 草稿列表
    html += '<div class="confirm-card-drafts">';
    drafts.forEach(function(d, i) {
      html += '<div class="confirm-card-draft">';
      html += '<span class="draft-index">#' + (i+1) + '</span>';
      html += '<span class="draft-title">' + wbEscapeHtml(d.summary || '(无标题)') + '</span>';
      html += '<span class="draft-meta">' + wbEscapeHtml(d.issueType || 'Task') + (d.priority ? ' · ' + d.priority : '') + (d.projectKey ? ' · ' + d.projectKey : '') + '</span>';
      html += '</div>';
    });
    html += '</div>';

    // 操作按钮
    html += '<div class="confirm-card-actions">';
    html += '<button class="confirm-btn confirm-btn-primary" onclick="window.wbConfirmOp(\'' + opId + '\', this)">✅ 确认创建</button>';
    html += '<button class="confirm-btn confirm-btn-secondary" onclick="window.wbRejectOp(\'' + opId + '\', this)">✕ 取消</button>';
    html += '</div>';
    html += '<div class="confirm-card-status" id="confirm-status-' + opId + '"></div>';
    html += '</div>';

    container.innerHTML = html;
    wbSmartScroll();
  }

  window.wbConfirmOp = function(opId, btn) {
    var statusEl = document.getElementById('confirm-status-' + opId);
    var card = document.querySelector('.confirm-card[data-op-id="' + opId + '"]');
    var btns = card ? card.querySelectorAll('.confirm-card-actions button') : [];
    btns.forEach(function(b) { b.disabled = true; });
    if (statusEl) statusEl.innerHTML = '<span style="color:#2563eb">⏳ 正在执行...</span>';

    var apiUrl = (window.wbBridgeUrl || getBridgeUrlDefault()) + '/operations/' + opId + '/confirm';
    fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          if (statusEl) statusEl.innerHTML = '<span style="color:#16a34a">✅ 已确认，AI 正在创建 Jira 任务...</span>';
          if (card) {
            setTimeout(function() {
              card.style.opacity = '0';
              card.style.transition = 'opacity 0.3s';
              setTimeout(function() { if (card.parentNode) card.parentNode.removeChild(card); }, 300);
            }, 1500);
          }
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ ' + (data.error || '操作失败') + '</span>';
          btns.forEach(function(b) { b.disabled = false; });
        }
      })
      .catch(function(e) {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 网络错误: ' + e.message + '</span>';
        btns.forEach(function(b) { b.disabled = false; });
      });
  };

  window.wbRejectOp = function(opId, btn) {
    var statusEl = document.getElementById('confirm-status-' + opId);
    var card = document.querySelector('.confirm-card[data-op-id="' + opId + '"]');
    var apiUrl = (window.wbBridgeUrl || getBridgeUrlDefault()) + '/operations/' + opId + '/reject';
    fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          if (card) {
            card.style.opacity = '0';
            card.style.transition = 'opacity 0.3s';
            setTimeout(function() { if (card.parentNode) card.parentNode.removeChild(card); }, 300);
          }
        }
      })
      .catch(function(e) {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ ' + e.message + '</span>';
      });
  };

  function wbEscapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }
})();
</script>
