# 项目管理领域断言规则
category: project
rules:
  - name: jira_task_query
    pattern: "(我的任务|分配给我|assignee|待办|todo|开发中|进行中|当前进度|sprint)"
    score: 0.85
    recommend_tool: query_jira_issues
    
  - name: jira_create_detected
    pattern: "(创建|新建|提交|create).*(issue|任务|bug|缺陷|需求|story|epic)"
    score: 0.9
    action: confirm
    message: "创建 Jira Issue 需要确认操作"
    
  - name: status_report
    pattern: "(周报|日报|进度报告|总结|汇总|本周|上周|这周)"
    score: 0.7
    recommend_tool: query_jira_issues
