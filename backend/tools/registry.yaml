# Alice V2.0 Tool Registry — 复刻 LlamaIndex Document Summary Index 层级检索
# 4 原子工具，完全解耦，通过标准 Tool Calling 协议由 LLM 自主决策调用顺序
#
# 设计思想:
#   search_docs_catalog  = LlamaIndex "获取所有 summary_ids + LLM 选择"
#   read_specific_doc     = LlamaIndex "docstore.get_nodes(summary_id)"
#   query_jira_metadata   = Jira 元数据查询 (标题/状态/经办人)
#   get_issue_commits     = SVN 双跳 Diff 检索
#
tools:
  - name: query_jira_metadata
    display: "Jira 元数据"
    description: >
      获取指定 Jira 任务的元数据信息（标题、状态、经办人）。
      这是轻量级查询，仅返回核心字段，不包含描述和评论。
      如果你需要详细描述、评论、或代码提交记录，请使用其他工具。
    category: jira
    icon: "🎫"
    risk: readonly
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true

  - name: get_issue_commits
    display: "代码提交检索"
    description: >
      获取指定 Jira 任务关联的 SVN 代码提交记录（列表）。
      返回提交版本号、作者、时间、文件数、增删行数。
      ⚠️ 此工具只返回提交列表，不包含具体代码 Diff。
      如需分析某次提交的代码变更，请使用 get_single_commit_diff。
    category: jira
    icon: "📝"
    risk: readonly
    function:
      parameters:
        issue_key:
          type: string
          description: "Jira 任务编号，例如 CT-11112"
          required: true

  - name: get_single_commit_diff
    display: "单次提交Diff"
    description: >
      获取指定 SVN 版本号（如 r40538）的单次代码 Diff 内容。
      当用户要求分析某次特定的代码提交（diff）、查看代码变更、审查某次提交时使用。
      返回该次提交的完整代码差异文本（已截断至安全长度）。
    category: jira
    icon: "📊"
    risk: readonly
    function:
      parameters:
        revision_id:
          type: string
          description: "SVN 版本号，例如 40538 或 r40538"
          required: true

  - name: search_docs_catalog
    display: "文档目录检索"
    description: >
      【复刻 LlamaIndex Document Summary Index 的"查目录"阶段】
      在知识库（Notion/Google Drive）中搜索匹配的文档标题和摘要。
      此工具仅返回文档的目录信息（标题、来源、文档ID、简短摘要），不返回正文。
      获取候选列表后，请使用 read_specific_doc 工具读取你感兴趣的文档全文。
      重要: 此工具不是全文搜索！它只返回文档的标题和摘要，供你筛选。
    category: knowledge
    icon: "📚"
    risk: readonly
    function:
      parameters:
        query:
          type: string
          description: "搜索关键词。⚠️绝不能传入完整的自然语言句子！必须从中提取 1 到 2 个最核心的业务名词（例如用户说'详细说明下球员系统设计文档'，只能传入'球员系统'）。"
          required: true
        source:
          type: string
          enum: ["notion", "gdrive", "all"]
          description: "指定搜索的知识库来源"
          default: "all"

  - name: read_specific_doc
    display: "文档详情阅读"
    description: >
      【核心约束：仅限知识库文档】通过精确的 doc_id 读取 Notion 或 GDrive 等知识库文档的全文。
      【绝对禁止】：严禁将此工具用于读取代码文件！严禁传入 SVN/Git 的文件路径！
      doc_id 必须且只能来源于 search_docs_catalog 工具返回的结果！严禁凭空构造 doc_id！
      此工具会返回文档的完整正文（前 8000 字符）。
      【跨工具关联】：读取文档后，如果你需要查找与文档内容相关的 Jira 任务，
      请从文档内容中提取最具区分度的业务术语（而非用户原话），再用 search_jira_issues 搜索。
    category: knowledge
    icon: "📖"
    risk: readonly
    function:
      parameters:
        doc_id:
          type: string
          description: "search_docs_catalog 返回的文档 ID"
          required: true
        source:
          type: string
          enum: ["notion", "gdrive"]
          description: "文档来源（与 search_docs_catalog 返回值一致）"
          required: true

  - name: create_issues_draft
    display: "Jira 批量草稿箱"
    description: >
      将一批待创建的 Jira 任务写入本地草稿箱（虚拟态），不会直接调用 Jira API。
      当用户要求草拟、拆分多个子任务、批量创建多个 Issue 时必须使用本工具。
      参数 issues_list 为数组，每项含 summary、projectKey、issueType，可选 description、assignee、labels。
      调用后前端会展示 draft_card，用户确认后才真正创建。
    category: jira
    icon: "📋"
    risk: write
    function:
      parameters:
        issues_list:
          type: array
          description: "草稿列表，每项为 {summary, projectKey, issueType, description?, assignee?}"
          required: true

  # ── M2.7 Mailbox worker tools (SQLite queue; not HITL approval state) ──
  - name: mailbox_list_tasks
    display: "Mailbox 拉取任务"
    description: >
      按 assignee / status 拉取 Mailbox 异步任务列表（pending/claimed/done/failed）。
      不存储审批状态；与 operation_id 无关。
    category: mailbox
    icon: "📬"
    risk: worker
    function:
      parameters:
        assignee:
          type: string
          description: "执行方标识（可选，与 dispatch 时一致）"
          required: false
        status:
          type: string
          enum: ["pending", "claimed", "done", "failed"]
          description: "按状态过滤（可选）"
          required: false
        limit:
          type: integer
          description: "返回条数上限，默认 50，最大 200"
          default: 50

  - name: mailbox_claim_task
    display: "Mailbox 领取任务"
    description: >
      将 pending 任务领取为 claimed（Worker 执行前标准步骤）。
    category: mailbox
    icon: "📥"
    risk: worker
    function:
      parameters:
        mailbox_task_id:
          type: string
          description: "Mailbox 任务 ID（mbox- 前缀）"
          required: true

  - name: mailbox_report_task
    display: "Mailbox 回报任务"
    description: >
      将 claimed 任务回报为 done 或 failed，并写入 result 对象。
    category: mailbox
    icon: "📤"
    risk: worker
    function:
      parameters:
        mailbox_task_id:
          type: string
          description: "Mailbox 任务 ID"
          required: true
        status:
          type: string
          enum: ["done", "failed"]
          description: "终态：done 或 failed"
          required: true
        result:
          type: object
          description: "执行结果 JSON（status=done 时建议提供）"
          required: false

  - name: search_jira_issues
    display: "Jira 关键词搜索"
    description: >
      通过关键词在 Jira 中搜索相关的任务列表。
      当你不知道具体的 Issue Key，但需要查找与某个主题、文档或模块相关的 Jira 任务时，必须使用此工具！
      返回匹配的任务列表（key, summary, status, assignee）。
    category: jira
    icon: "🔍"
    risk: readonly
    function:
      parameters:
        keyword:
          type: string
          description: "搜索关键词。⚠️关键词必须是你从文档内容或上下文中提取的最具区分度的业务术语，而非用户原话！例如：文档中提到'展示系数'、'命名规范'，就用这些词搜索，而不是用文档标题。每次只传1-2个核心术语。"
          required: true

  - name: search_doc_chunks
    display: "知识库语义检索"
    description: >
      通过语义相似度在知识库文档中检索最相关的片段。
      当你需要查询特定主题、概念或业务术语的内容（而非精确标题匹配）时，优先使用此工具。
      返回 Top-K 文档片段及其相似度分数。
    category: kb
    icon: "🧠"
    risk: readonly
    function:
      parameters:
        query:
          type: string
          description: "要检索的语义查询文本"
          required: true
        doc_id:
          type: string
          description: "限定文档 ID（可选，不传则全局检索）"
          required: false
        top_k:
          type: integer
          description: "返回片段数量，默认 3，最大 5"
          default: 3

  - name: read_file
    display: "读文件"
    description: 读取工作区内的文件内容（只读）。读取范围限制在已授权的工作区目录内。不能读取 .env 等敏感配置文件。
    category: workspace
    icon: "📄"
    risk: readonly
    deprecated: true
    deprecated_message: "已被 Cursor SDK 内置工具替代"
    function:
      parameters:
        path:
          type: string
          description: "文件的相对路径或绝对路径（必须在已授权工作区内）"
          required: true
        max_lines:
          type: integer
          description: "最大读取行数（默认 200）"
          required: false

  - name: search_code
    display: "代码搜索"
    description: 使用 ripgrep 在工作区内搜索代码内容。支持正则表达式和文件类型过滤。只读，不修改文件。
    category: workspace
    icon: "🔍"
    risk: readonly
    deprecated: true
    deprecated_message: "已被 Cursor SDK 内置工具替代"
    function:
      parameters:
        pattern:
          type: string
          description: "搜索的正则表达式或关键词"
          required: true
        path:
          type: string
          description: "搜索路径（默认为当前工作区根目录）"
          required: false
        glob:
          type: string
          description: "文件类型过滤，例如 '*.py' 或 '*.{js,ts}'"
          required: false

  - name: svn_log
    display: "SVN日志"
    description: 查看工作区内 SVN 仓库的提交历史（只读）。不修改 SVN 状态。
    category: workspace
    icon: "📜"
    risk: readonly
    deprecated: true
    deprecated_message: "已被 Cursor SDK 内置工具替代"
    function:
      parameters:
        path:
          type: string
          description: "工作区内的文件或目录路径"
          required: true
        limit:
          type: integer
          description: "返回最近 N 条提交记录（默认 20）"
          required: false

  - name: list_directory
    display: "列目录"
    description: 列出工作区内的目录结构（只读）。不修改文件。
    category: workspace
    icon: "📁"
    risk: readonly
    deprecated: true
    deprecated_message: "已被 Cursor SDK 内置工具替代"
    function:
      parameters:
        path:
          type: string
          description: "要列出的目录路径（必须在已授权工作区内）"
          required: true

