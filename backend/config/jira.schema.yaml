# Alice Jira 运行时配置契约（多项目，禁止单团队硬编码）
# 可与 global_config.json / 请求 config / 环境变量合并

defaults:
  projectKeys: []          # 空则使用 JIRA_PROJECTS 环境变量
  defaultIssueType: Task
  maxSearchResults: 50
  doneStatusKeywords:
    - 完成
    - 关闭
    - 已解决
    - Done
    - Closed
    - Resolved

# 按人名查任务时，除经办人外额外 OR 的人物字段（默认空 = 仅 assignee）
ownerFieldCandidates: []

# 字段含义词典（global_config JIRA_FIELD_GLOSSARY，全实例共享，非按项目）
# 示例:
# JIRA_FIELD_GLOSSARY:
#   - fieldName: "End date"
#     meaning: "策划排期完成日"
#     aliases: ["截止时间", "ddl"]

# 按项目覆盖（projectKey 大写）
projects: {}
