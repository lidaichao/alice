# Alice v3.0 · n8n 自动化连接器
# 用途：Jira/SVN/Notion 集成、数据清洗、通知
# 部署：docker compose -f docker-compose.n8n.yml up -d
# 约束：内存 ≤1GB，CPU ≤1 核（§八 约束#13 / Phase 0.8）
#       n8n 容器为无状态节点，工作流 JSON 以 Git 为唯一真源（约束#22）

version: '3.8'

services:
  n8n:
    image: n8nio/n8n:1.87.0
    container_name: alice-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      N8N_ENCRYPTION_KEY: n8n-alice-v3-encryption-key-change-in-production
      # 数据库（SQLite，满足 Alice <10 人规模，不违 C8 禁令）
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
      # 执行模式
      EXECUTIONS_MODE: regular
      EXECUTIONS_TIMEOUT: 120
      EXECUTIONS_TIMEOUT_MAX: 300
      # 日志级别
      N8N_LOG_LEVEL: info
      # 禁用遥测
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      # 工作流默认设置
      N8N_TEMPLATES_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      # 工作流 JSON 挂载（从 Git 同步）
      - ./backend/n8n_workflows:/home/node/.n8n/workflows:ro
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'

volumes:
  n8n_data:
