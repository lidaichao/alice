name: Alice V2.0 — CI/CD Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'rc'
        type: choice
        options: [rc, stable]

env:
  DOCKER_REGISTRY: harbor.lmdgame.com/alice
  IMAGE_NAME: alice-ai-bridge
  NODE_VERSION: '22'

jobs:
  # ═══════════════════════════════════════════════════════
  #  Job 1: 后端 Docker 镜像构建
  # ═══════════════════════════════════════════════════════
  build-backend:
    name: Build Backend (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ai-bridge
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════
  #  Job 2: 前端 Electron 打包
  # ═══════════════════════════════════════════════════════
  build-frontend:
    name: Build Frontend (Electron)
    runs-on: windows-latest
    needs: []  # 与后端并行构建

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build NSIS installer
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Alice-Desktop-Setup
          path: desktop/dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.release_type == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
