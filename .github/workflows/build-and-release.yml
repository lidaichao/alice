name: Alice V2.0 — CI/CD Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'rc'
        type: choice
        options: [rc, stable]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════
  #  Job 1: 全平台编译打包 (Backend + Frontend + Desktop)
  # ═══════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup ────────────────────────────────

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Step 1: Backend (PyInstaller) ─────────

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build Backend (PyInstaller)
        working-directory: backend
        run: |
          pyinstaller --noconfirm --onedir --windowed --name ai_bridge \
            --add-data "tools:tools" \
            --add-data "skills:skills" \
            --add-data "logic:logic" \
            --hidden-import flask \
            --hidden-import flask_cors \
            --hidden-import waitress \
            --hidden-import yaml \
            ai_bridge.py
        shell: bash

      - name: Verify backend build
        run: |
          if [ -f "backend/dist/ai_bridge/ai_bridge" ] || [ -f "backend/dist/ai_bridge/ai_bridge.exe" ]; then
            echo "✅ Backend binary found"
          else
            echo "⚠️ Backend binary not at expected path"
            ls -la backend/dist/ || true
          fi
        shell: bash

      # ── Step 2: Frontend (Vite) ──────────────

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install --silent
        shell: bash

      - name: Build Frontend (Vite)
        working-directory: frontend
        run: npm run build
        shell: bash

      - name: Verify frontend build
        run: |
          if [ -f "frontend/dist/index.html" ]; then
            echo "✅ Frontend build found"
          else
            echo "⚠️ frontend/dist/index.html missing"
          fi
        shell: bash

      # ── Step 3: Desktop (electron-builder) ───

      - name: Install Desktop dependencies
        working-directory: desktop
        run: npm install --silent
        shell: bash

      - name: Build Desktop
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      # ── Upload artifacts ─────────────────────

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Alice-macOS-${{ github.ref_name }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          retention-days: 14

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Alice-Windows-${{ github.ref_name }}
          path: desktop/dist/*.exe
          retention-days: 14

  # ═══════════════════════════════════════════════════════
  #  Job 2: GitHub Release (仅在 tag 推送时触发)
  # ═══════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.release_type == 'rc' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
