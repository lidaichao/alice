# Alice v3.0 · Pre-commit 钩子配置
# 用途：每次 git commit 前自动检查代码质量
# 安装：pip install pre-commit && pre-commit install
# Phase 0.9 · CI/CD 渐进式交付（约束#19）

repos:
  # Ruff：Python 代码质量（替代 flake8 + isort + 更多）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--select, E,F,B,SIM,UP,I,N]
        exclude: ^specs/|^scripts/

  # 死代码 Import 扫描（约束#21 · 防旧模块回流）
  - repo: local
    hooks:
      - id: no-dead-imports
        name: "死代码 Import 扫描（Phase 0.9 · 约束#21）"
        entry: bash -c '! rg -n "import faiss|from jira_api import|knowledge_retriever|rag_engine|react_runner|plugin_gateway|workflow_engine" backend/ || exit 0'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: no-debug-logs
        name: "禁止 DEBUG 级别日志硬编码（约束#16）"
        entry: bash -c '! rg -n "^[^#]*logger\.(debug|setLevel.*DEBUG)" backend/ai_bridge.py backend/agent_graph.py || exit 0'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
